<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Floorball Frenzy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100dvw;
        height: 100dvh;
        overflow: hidden;
        background: #000;
      }

      /* Portrait overlay — asks user to rotate; hides game */
      #rotate-msg {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        font-family: sans-serif;
        font-size: 22px;
        text-align: center;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        gap: 16px;
      }
      #rotate-msg span { font-size: 56px; }
      @media (orientation: portrait) {
        #rotate-msg { display: flex; }
      }

      /* Fullscreen toggle — always in real viewport corner, above canvas */
      #fs-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 998;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
        font-size: 22px;
        line-height: 1;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Hide when browser has no fullscreen API (e.g. iOS Safari) */
      .no-fullscreen #fs-btn { display: none; }
    </style>
  </head>
  <body>
    <div id="rotate-msg">
      <span>&#8635;</span>
      Please rotate your device to landscape
    </div>

    <button id="fs-btn" title="Toggle fullscreen">&#x26F6;</button>

    <script>
      // Mark body if fullscreen API is unavailable (hides button via CSS)
      if (typeof document.documentElement.requestFullscreen !== "function") {
        document.body.classList.add("no-fullscreen");
      }

      // Portrait overlay — JS supplement to the CSS media query
      var rotateMsg = document.getElementById("rotate-msg");
      function updateOrientation() {
        var portrait = window.innerWidth < window.innerHeight;
        rotateMsg.style.display = portrait ? "flex" : "none";
      }
      window.addEventListener("resize", updateOrientation);
      window.addEventListener("orientationchange", function () {
        setTimeout(updateOrientation, 100);
      });
      updateOrientation();

      document.getElementById("fs-btn").addEventListener("click", function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().then(function () {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock("landscape").catch(function () {});
            }
          }).catch(function () {});
        } else {
          document.exitFullscreen();
        }
      });
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
