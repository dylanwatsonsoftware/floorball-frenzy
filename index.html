<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport managed by 'scream' in src/main.ts -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Floorball Frenzy</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Floorball Frenzy" />
    <meta property="og:description" content="Fast-paced 2-player online floorball. First to 5 goals wins!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://floorball-frenzy.vercel.app/" />
    <meta property="og:image" content="https://floorball-frenzy.vercel.app/assets/floorball-frenzy-wide.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:site_name" content="Floorball Frenzy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Floorball Frenzy" />
    <meta name="twitter:description" content="Fast-paced 2-player online floorball. First to 5 goals wins!" />
    <meta name="twitter:image" content="https://floorball-frenzy.vercel.app/assets/floorball-frenzy-wide.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100dvw;
        height: 100dvh;
        overflow: hidden;
        background: #1a1a2e;
      }
      /* iOS Safari: dvh can still overlap the persistent bottom toolbar;
         -webkit-fill-available is the actual usable height on iOS.
         Safe-area padding is iOS-only so it doesn't shrink the canvas on desktop/fullscreen. */
      @supports (-webkit-touch-callout: none) {
        html, body {
          height: -webkit-fill-available;
          /* Keep content inside safe areas (notch, status bar, home indicator) */
          padding: env(safe-area-inset-top, 0px)
                   env(safe-area-inset-right, 0px)
                   env(safe-area-inset-bottom, 0px)
                   env(safe-area-inset-left, 0px);
        }
      }

      /* Fullscreen toggle — always in real viewport corner, above canvas */
      #fs-btn {
        position: fixed;
        bottom: 8px;
        right: 8px;
        z-index: 998;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
        font-size: 22px;
        line-height: 1;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Hide when browser has no fullscreen API (e.g. iOS Safari) */
      .no-fullscreen #fs-btn { display: none; }

      /* In-App Browser Overlay */
      #iab-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100dvw;
        height: 100dvh;
        background: #1a1a2e;
        color: #fff;
        z-index: 9999;
        display: none; /* Shown via JS */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #iab-overlay h2 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #ff4d4d;
      }
      #iab-overlay p {
        font-size: 18px;
        line-height: 1.5;
        margin-bottom: 30px;
        max-width: 500px;
      }
      #iab-overlay .btn-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
        max-width: 300px;
      }
      #iab-overlay button {
        padding: 15px 25px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      #iab-dismiss {
        background: #4ecdc4;
        color: #1a1a2e;
      }
      #iab-overlay button:active {
        opacity: 0.8;
      }
    </style>
    <script>
      window.global = window;
    </script>
  </head>
  <body>
    <div id="iab-overlay">
      <h2 id="iab-title">In-App Browser Detected</h2>
      <p id="iab-message">
        It looks like you're playing inside <strong>the app</strong>. This game may have issues here.
        <br><br>
        For the best experience, please tap the menu (⋮ or ...) or share icon and select <strong>'Open in Chrome'</strong> or <strong>'Open in Safari'</strong>.
      </p>
      <div class="btn-container">
        <button id="iab-dismiss">Play Anyway</button>
      </div>
    </div>

    <button id="fs-btn" title="Toggle fullscreen">&#x26F6;</button>

    <script>
      // Mark body if fullscreen API is unavailable (hides button via CSS)
      if (typeof document.documentElement.requestFullscreen !== "function") {
        document.body.classList.add("no-fullscreen");
      }

      document.getElementById("fs-btn").addEventListener("click", function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function () {});
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(function () {});
          }
        } else {
          document.exitFullscreen();
          if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
          }
        }
      });
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
